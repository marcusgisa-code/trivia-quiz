<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Das Quiz – neues Spielprinzip</title>
  <style>
    :root {
      --bg: #051622;
      --shell: #071725;
      --shell-2: #03101b;
      --card: #0b2536;
      --primary: #1e88e5;
      --primary-dark: #0d47a1;
      --accent: #ff9800;
      --accent-soft: #ffb74d;
      --text-main: #f9fbff;
      --text-muted: #b7c3d1;
      --radius-l: 18px;
      --radius-s: 10px;
      --shadow-soft: 0 18px 40px rgba(0,0,0,0.35);
      --green-a: #64ffda;
      --green-b: #1de9b6;
      --red-a: #ff8a80;
      --red-b: #ff5252;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #0d2b45 0, #020c16 60%, #000 100%);
      color: var(--text-main);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .app {
      width: 100%;
      max-width: 540px;
      min-height: auto;
      margin: 0 auto;
    }

    .screen {
      min-height: auto;
    }

    .hidden { display: none !important; }

    .fade-in {
      animation: fadeIn 0.32s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .welcome-card {
      width: min(540px, 100%);
      margin: 0 auto;
      background: linear-gradient(135deg, var(--shell), var(--shell-2));
      border-radius: 28px;
      box-shadow: var(--shadow-soft);
      padding: 28px 24px 26px;
      border: 1px solid rgba(255,255,255,0.06);
      backdrop-filter: blur(10px);
      position: relative;
      overflow: hidden;
    }

    .welcome-card::before {
      content: "";
      position: absolute;
      inset: -100px;
      background:
        radial-gradient(circle at top left, rgba(30,136,229,0.32), transparent 58%),
        radial-gradient(circle at bottom right, rgba(255,152,0,0.18), transparent 58%);
      pointer-events: none;
    }

    .welcome-card > * {
      position: relative;
      z-index: 1;
    }

    h1, p { margin: 0; }

    .welcome-card h1 {
      margin-bottom: 10px;
      font-size: clamp(30px, 4vw, 44px);
      color: var(--text-main);
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      text-align: center;
    }

    .welcome-card p {
      font-size: 16px;
      line-height: 1.45;
      margin-bottom: 20px;
      color: var(--text-muted);
      text-align: center;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 16px;
    }

    .field-row {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
    }

    .field-row .field {
      margin-bottom: 0;
    }

    .field-plz { flex: 0 0 110px; }
    .field-ort { flex: 1; }

    label {
      font-size: 13px;
      font-weight: 800;
      color: var(--accent-soft);
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    input[type="text"],
    input[type="file"] {
      width: 100%;
      padding: 15px 16px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.05);
      color: var(--text-main);
      font-size: 18px;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.02);
    }

    input[type="text"]::placeholder {
      color: #90a4ae;
    }

    .hint {
      font-size: 13px;
      color: var(--text-muted);
    }

    .button-row {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      margin-top: 22px;
      justify-content: center;
    }

    button {
      border: 0;
      cursor: pointer;
      transition: transform 0.14s ease, opacity 0.14s ease, filter 0.14s ease, box-shadow 0.14s ease;
      -webkit-tap-highlight-color: transparent;
      font-family: inherit;
    }

    button:hover { transform: translateY(-1px); }
    button:active { transform: scale(0.985); }
    button:disabled { opacity: 0.55; cursor: default; transform: none; }

    .btn-primary,
    .continue-btn,
    .primary-btn {
      padding: 12px 28px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--accent-soft), var(--accent));
      color: #031019;
      font-weight: 700;
      font-size: 15px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      box-shadow: 0 12px 26px rgba(0,0,0,0.55), 0 0 18px rgba(255,152,0,0.55);
    }

    .btn-primary:hover,
    .continue-btn:hover,
    .primary-btn:hover {
      filter: brightness(1.05);
      transform: translateY(-2px);
    }

    .btn-secondary {
      padding: 12px 28px;
      border-radius: 999px;
      background: linear-gradient(135deg, #1e88e5, #0d47a1);
      color: #f9fbff;
      font-weight: 700;
      font-size: 15px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      box-shadow: 0 12px 26px rgba(0,0,0,0.55), 0 0 18px rgba(30,136,229,0.4);
      border: none;
      cursor: pointer;
    }

    .btn-secondary:hover {
      filter: brightness(1.1);
      transform: translateY(-2px);
    }

    .hs-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
    }

    .hs-table th {
      font-size: 11px;
      font-weight: 800;
      color: var(--accent-soft);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      padding: 6px 6px 10px;
      border-bottom: 1px solid rgba(255,255,255,0.12);
      text-align: left;
    }

    .hs-table th.hs-score { text-align: right; }

    .hs-table td {
      padding: 10px 6px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      color: var(--text-main);
      font-size: 15px;
    }

    .hs-rank {
      width: 32px;
      color: var(--text-muted);
      font-weight: 700;
    }

    .hs-score {
      color: var(--accent-soft);
      font-weight: 800;
      text-align: right;
    }

    .hs-loading {
      color: var(--text-muted);
      text-align: center;
      padding: 24px 0;
      font-size: 15px;
    }

    /* ── Edit Mode ───────────────────────────────── */
    .edit-header-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .edit-badge {
      display: inline-block;
      background: #2a1550;
      border: 1px solid #6b3db0;
      color: #c084fc;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 6px;
    }
    .edit-counter {
      font-size: 13px;
      font-weight: 600;
      color: rgba(255,255,255,0.5);
      margin-left: auto;
    }
    .edit-bad-count-label {
      font-size: 11px;
      color: rgba(255,255,255,0.3);
    }
    .edit-question {
      font-size: 17px;
      font-weight: 600;
      color: #fff;
      line-height: 1.5;
      padding: 16px;
      background: rgba(255,255,255,0.04);
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.07);
      margin-bottom: 14px;
    }
    .edit-answers {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 20px;
    }
    .edit-answer {
      padding: 11px 14px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 10px;
      font-size: 15px;
      color: rgba(255,255,255,0.75);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .edit-answer.is-correct {
      border-color: rgba(100,255,218,0.35);
      background: rgba(100,255,218,0.07);
      color: #fff;
    }
    .ea-label {
      font-size: 10px;
      font-weight: 800;
      color: rgba(255,255,255,0.25);
      min-width: 16px;
    }
    .edit-answer.is-correct .ea-label { color: #64ffda; }
    .edit-actions {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }
    .edit-btn {
      flex: 1;
      padding: 13px 0;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      text-align: center;
    }
    .edit-btn-ok {
      background: rgba(55,138,221,0.15);
      color: #378ADD;
      border: 1.5px solid rgba(55,138,221,0.4);
    }
    .edit-btn-bad {
      background: rgba(226,75,74,0.12);
      color: #e24b4a;
      border: 1.5px solid rgba(226,75,74,0.35);
    }
    .edit-btn-back {
      flex: 0 0 auto;
      padding: 13px 18px;
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.45);
      border: 1.5px solid rgba(255,255,255,0.12);
    }
    .edit-btn:disabled { opacity: 0.4; cursor: default; pointer-events: none; }
    .edit-status {
      text-align: center;
      font-size: 13px;
      color: rgba(255,255,255,0.45);
      padding: 8px 0;
    }
    .edit-exit {
      background: none;
      border: none;
      color: rgba(255,255,255,0.3);
      font-size: 13px;
      cursor: pointer;
      padding: 4px 0;
      display: block;
      text-align: center;
      width: 100%;
      margin-top: 4px;
    }
    .edit-exit:hover { color: rgba(255,255,255,0.6); }
    /* ── /Edit Mode ───────────────────────────────── */

    .continue-btn.is-disabled,
    .continue-btn:disabled {
      background: linear-gradient(135deg, #7f8790, #5d6670);
      color: rgba(255,255,255,0.7);
      box-shadow: 0 8px 20px rgba(0,0,0,0.35);
      filter: grayscale(0.25);
      cursor: default;
      pointer-events: none;
    }

    .quiz-screen {
      width: 100%;
      background: linear-gradient(135deg, var(--shell), var(--shell-2));
      border-radius: 28px;
      padding: 22px 24px 24px;
      box-shadow: var(--shadow-soft);
      border: 1px solid rgba(255,255,255,0.05);
      position: relative;
      overflow: hidden;
    }

    .quiz-screen::before {
      content: "";
      position: absolute;
      inset: -120px;
      background:
        radial-gradient(circle at top left, rgba(30,136,229,0.35), transparent 60%),
        radial-gradient(circle at bottom right, rgba(255,152,0,0.20), transparent 60%);
      opacity: 0.9;
      z-index: 0;
      pointer-events: none;
    }

    .quiz-screen > * {
      position: relative;
      z-index: 1;
    }

    /* ── Topbar: new 3-column header ── */
    /* ── Topbar ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 20px;
    }

    /* Left: player pill */
    .tb-player {
      background: #162035;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 999px;
      padding: 8px 18px 8px 8px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .tb-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: rgba(55,138,221,0.15);
      border: 1.5px solid rgba(55,138,221,0.4);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700; color: #378ADD;
      flex-shrink: 0;
      text-transform: uppercase;
    }

    #ui-username {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-main);
      line-height: 1.2;
      white-space: nowrap;
    }

    #ui-score {
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      line-height: 1.2;
    }

    /* Center: three chips */
    .tb-chips {
      display: flex;
      gap: 8px;
    }

    .tb-chip {
      background: #162035;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 7px 18px;
      display: flex; flex-direction: column; align-items: center; gap: 2px;
      flex-shrink: 0;
    }

    .c-label {
      font-size: 9px;
      color: rgba(255,255,255,0.35);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .c-val {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-main);
      line-height: 1.1;
    }

    .tb-gold { color: #f5a623; }

    .tb-chips.level-3 .label-level {
      color: #ff8a50;
      text-shadow: 0 0 10px rgba(255,100,30,0.6);
    }

    /* Right: timer circle */
    #ui-timer {
      width: 56px; height: 56px;
      border-radius: 50%;
      background: rgba(55,138,221,0.12);
      border: 1.5px solid rgba(55,138,221,0.35);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
    }

    .tb-timer-num {
      font-size: 22px; font-weight: 700;
      color: var(--text-main);
      line-height: 1;
    }

    .tb-timer-sek {
      font-size: 8px;
      color: rgba(255,255,255,0.35);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    #ui-timer.is-penalty {
      background: rgba(180,30,50,0.2);
      border-color: rgba(200,40,60,0.7);
      box-shadow: 0 0 18px rgba(200,40,60,0.35);
    }

    #ui-timer.is-penalty .tb-timer-num { color: #ffb3b3; }

    /* progress-track removed */

    .question-box {
      border-radius: var(--radius-l);
      background: linear-gradient(135deg, rgba(5,31,52,0.98), rgba(9,35,56,0.98));
      border: 1px solid rgba(255,255,255,0.06);
      padding: 18px 20px 20px;
      margin-bottom: 18px;
      box-shadow: 0 12px 26px rgba(0,0,0,0.32);
      position: relative;
      text-align: center;
      min-height: auto;
      display: block;
    }

    .question-text {
      font-size: 20px;
      line-height: 1.35;
      color: var(--text-main);
      font-weight: 600;
      margin: 0;
      font-style: normal;
      letter-spacing: normal;
    }

    .go-card {
      background: #162035;
      border: 1px solid #2a3a55;
      border-radius: 16px;
      overflow: hidden;
      margin-top: 16px;
    }
    .go-card-top {
      padding: 28px 24px 24px;
      text-align: center;
      border-bottom: 1px solid #2a3a55;
    }
    .go-tag {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #e24b4a;
      background: #2a1515;
      border: 1px solid #5a2020;
      border-radius: 6px;
      padding: 3px 10px;
      margin-bottom: 14px;
    }
    .go-player {
      font-size: 22px;
      font-weight: 700;
      color: #ffffff;
      margin: 0 0 4px;
    }
    .go-sub {
      font-size: 13px;
      color: #8899aa;
      margin: 0;
    }
    .go-stats {
      display: flex;
      border-bottom: 1px solid #2a3a55;
    }
    .go-stat {
      flex: 1;
      padding: 20px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .go-stat + .go-stat { border-left: 1px solid #2a3a55; }
    .go-stat-n {
      font-size: 28px;
      font-weight: 800;
      color: #ffffff;
      line-height: 1;
    }
    .go-stat-n.gold { color: #f5a623; }
    .go-stat-l {
      font-size: 10px;
      color: #8899aa;
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }
    .go-btns {
      padding: 16px;
      display: flex;
      gap: 10px;
    }
    .go-btn {
      border-radius: 999px;
      padding: 14px 0;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      text-align: center;
      border: none;
    }
    .go-btn-primary {
      background: #c47a0a;
      color: #ffffff;
      flex: 2;
    }
    .go-btn-secondary {
      background: #1e3048;
      color: #ffffff;
      flex: 1;
      border: 1.5px solid #3a5070;
    }

    .answers {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* ── Answer button: base layout ── */
    .answer-row {
      display: flex;
      align-items: stretch;
      gap: 0;
      border-radius: var(--radius-s);
      background: #1c2432;
      border: 2px solid rgba(255,255,255,0.10);
      overflow: hidden;
      cursor: pointer;
      transition:
        border-color 0.15s ease-out,
        box-shadow 0.15s ease-out;
      position: relative;
      padding: 0;
      min-height: 62px;
    }

    .answer-row:hover:not(.locked):not(.correct-state):not(.wrong-state):not(.clicked-state) {
      border-color: rgba(255,255,255,0.28);
      box-shadow: 0 4px 14px rgba(0,0,0,0.25);
    }

    /* Letter badge */
    .answer-row .letter {
      width: 54px;
      min-width: 54px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0f0f0;
      color: #0d2236;
      font-weight: 800;
      font-size: 20px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      flex-shrink: 0;
      border-radius: 0;
      transition: background 0.15s ease, color 0.15s ease;
    }

    /* Answer text */
    .answer-row .answer-text {
      font-size: 17px;
      color: var(--text-main);
      font-weight: 500;
      flex: 1;
      text-align: left;
      padding: 16px 18px;
      line-height: 1.3;
      background: #212b38;
    }

    /* Remove the ::before circle indicator */
    .answer-row::before { display: none; }

    /* ── Clicked state (yellow) ── */
    .answer-row.clicked-state {
      border-color: #f5e642;
      box-shadow: 0 0 0 1px #f5e642;
    }
    .answer-row.clicked-state .letter {
      background: #0d2236;
      color: #f5e642;
    }
    .answer-row.clicked-state .answer-text {
      background: #0d2236;
    }

    /* ── Correct state (green) ── */
    .answer-row.correct-state {
      border-color: #0aff2e;
      box-shadow: 0 0 0 1px #0aff2e, 0 0 18px rgba(10,255,46,0.25);
    }
    .answer-row.correct-state .letter {
      background: #0d2236;
      color: #0aff2e;
    }
    .answer-row.correct-state .answer-text {
      background: #0d2236;
    }

    /* ── Wrong state (red) ── */
    .answer-row.wrong-state {
      border-color: #f04040;
      box-shadow: 0 0 0 1px #f04040, 0 0 18px rgba(240,64,64,0.25);
    }
    .answer-row.wrong-state .letter {
      background: #0d2236;
      color: #f04040;
    }
    .answer-row.wrong-state .answer-text {
      background: #0d2236;
    }

    .below-panel {
      margin-top: 24px;
      min-height: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      text-align: center;
    }

    .next-answer-wrap {
      width: 100%;
      display: flex;
      justify-content: center;
    }

    .next-answer-btn {
      width: 100%;
      padding: 18px 28px;
      border-radius: var(--radius-s);
      border: none;
      background: linear-gradient(135deg, #4a6cf7, #3b5bdb);
      color: #ffffff;
      font-weight: 800;
      font-size: 20px;
      letter-spacing: 0.03em;
      text-transform: none;
      box-shadow: 0 8px 24px rgba(59,91,219,0.45);
      min-width: unset;
      max-width: 100%;
      font-style: normal;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
    }

    .next-answer-btn::before {
      content: ">";
      font-size: 22px;
      font-weight: 900;
      flex-shrink: 0;
    }

    .next-answer-btn:hover {
      filter: brightness(1.08);
      transform: translateY(-1px);
      box-shadow: 0 10px 28px rgba(59,91,219,0.55);
    }

    .result-points {
      font-size: clamp(28px, 2.8vw, 48px);
      font-style: normal;
      font-weight: 800;
      line-height: 1;
      color: var(--accent-soft);
      text-shadow: 0 0 20px rgba(255,152,0,0.25);
    }

    #result-total {
      font-size: clamp(30px, 3.2vw, 56px) !important;
      color: var(--accent-soft);
      font-weight: 800;
      text-shadow: 0 0 20px rgba(255,152,0,0.25);
    }

    .small-info {
      font-size: 18px;
      color: var(--text-muted);
      font-style: normal;
    }

    .continue-btn {
      min-width: 220px;
      min-height: unset;
      font-size: 15px;
      font-style: normal;
      border: none;
    }


    @media (max-width: 520px) {
      body {
        padding: 14px;
      }

      .quiz-screen {
        padding: 18px 20px 20px;
      }

      .topbar { gap: 8px; }
      .tb-player { padding: 6px 12px 6px 6px; gap: 7px; }
      .tb-avatar { width: 30px; height: 30px; font-size: 12px; }
      #ui-username { font-size: 12px; }
      .tb-chip { padding: 6px 12px; }

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp, getDocs, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBJ4iLxCmCDq_wLIADbVwupGoaHgktVZDU",
      authDomain: "gisaquiz-cbae5.firebaseapp.com",
      projectId: "gisaquiz-cbae5",
      storageBucket: "gisaquiz-cbae5.firebasestorage.app",
      messagingSenderId: "441662458718",
      appId: "1:441662458718:web:b61ae975e480b9d2339dcf"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.saveScore = async function(username, score, plz, ort, land) {
      if (!username || score <= 0) return;
      try {
        await addDoc(collection(db, "scores"), {
          username, score, plz, ort, land, timestamp: serverTimestamp()
        });
      } catch (e) {
        console.warn("Score konnte nicht gespeichert werden:", e);
      }
    };

    window.loadHighscores = async function() {
      try {
        const q = query(collection(db, "scores"), orderBy("score", "desc"), limit(10));
        const snap = await getDocs(q);
        return snap.docs.map(d => d.data());
      } catch(e) {
        console.warn("Highscores konnten nicht geladen werden:", e);
        return [];
      }
    };
  </script>

  <script>
    const DEMO_CSV = `
42036;Du reist in die Hauptstadt von Argentinien, also nach...;Buenos Aires;Córdoba;Santa Cruz;1;1
42037;Welches Album von Michael Jackson verkaufte sich bis ins Jahr 2002 fast 50 Millionen Mal?;Bad;Thriller;Blood on the Dancefloor;2;1
42038;Welches ist der Geburtsname von Andy Warhol?;Andrew Warhola;Steven Miller;Jossif Wissarionowitsch Dschugaschwili;1;1
42039;Der Bildhauer Alexander Calder gilt als der Erfinder des...;Mobile;Mobilfunk;Mobiltelefon;1;1
42040;Wie heißt die Hauptstadt von Kanada?;Toronto;Ottawa;Vancouver;2;2
42041;Welche Sprache wird in Brasilien überwiegend gesprochen?;Spanisch;Portugiesisch;Französisch;2;2
42042;Wie viele Kontinente gibt es im gängigen Schulmodell?;5;6;7;3;2
42043;Welcher Planet ist als Roter Planet bekannt?;Venus;Mars;Jupiter;2;3
42044;Wie heißt das chemische Symbol für Gold?;Ag;Au;Go;2;3
42045;Wer schrieb „Faust"?;Schiller;Goethe;Kafka;2;3
`.trim();

    const LETTERS = ["A", "B", "C"];
    const DIFFICULTY_LABELS = { 1: "einfach", 2: "mittel", 3: "schwer" };

    const state = {
      username: "",
      plz: "",
      ort: "",
      land: "",
      round: 1,
      totalScore: 0,
      timerValue: 0,
      timerId: null,
      flowToken: 0,
      currentQuestion: null,
      currentDifficulty: 1,
      currentVisibleAnswers: 0,
      selectedMultiplier: 3,
      correctStreak: 0,
      questionsPlayed: 0,
      correctAnswers: 0,
      questions: [],
      usedIds: new Set()
    };

    const screens = {
      welcome: document.getElementById("screen-welcome"),
      quiz: document.getElementById("screen-quiz"),
      highscore: document.getElementById("screen-highscore"),
      edit: document.getElementById("screen-edit")
    };

    const els = {
      usernameInput: document.getElementById("username"),
      ortInput: document.getElementById("ort"),
      loadingHint: document.getElementById("loading-hint"),
      highscoreList: document.getElementById("highscore-list"),
      backBtn: document.getElementById("back-btn"),
      highscoreBtn: document.getElementById("highscore-btn"),
      startBtn: document.getElementById("start-btn"),
      uiUsername: document.getElementById("ui-username"),
      uiScore: document.getElementById("ui-score"),
      uiAvatar: document.getElementById("ui-avatar"),
      uiWert: document.getElementById("ui-wert"),
      uiRoundDifficulty: document.getElementById("ui-round-difficulty"),
      uiTimer: document.getElementById("ui-timer"),
      uiTimerNum: document.getElementById("ui-timer-num"),
      progressFilled: null, // removed
      questionText: document.getElementById("question-text"),
      answers: document.getElementById("answers"),
      nextAnswerWrap: document.getElementById("next-answer-wrap"),
      nextAnswerBtn: document.getElementById("next-answer-btn"),
      resultPoints: document.getElementById("result-points"),
      resultTotal: document.getElementById("result-total"),
      resultInfo: document.getElementById("result-info"),
      continueBtn: document.getElementById("continue-btn"),
      restartBtn: document.getElementById("restart-btn"),
      editQuestionText: document.getElementById("edit-question-text"),
      editAnswers: document.getElementById("edit-answers"),
      editIdx: document.getElementById("edit-idx"),
      editTotal: document.getElementById("edit-total"),
      editBadCount: document.getElementById("edit-bad-count"),
      editOkBtn: document.getElementById("edit-ok-btn"),
      editBadBtn: document.getElementById("edit-bad-btn"),
      editBackBtn: document.getElementById("edit-back-btn"),
      editStatus: document.getElementById("edit-status"),
      editExitBtn: document.getElementById("edit-exit-btn"),
      goCard: document.getElementById("game-over-card"),
      goPlayerName: document.getElementById("go-player-name"),
      goQuestionsPlayed: document.getElementById("go-questions-played"),
      goScore: document.getElementById("go-score"),
      goQuestions: document.getElementById("go-questions"),
      goCorrect: document.getElementById("go-correct"),
      goHsBtn: document.getElementById("go-hs-btn"),
      goRestartBtn: document.getElementById("go-restart-btn"),
      questionBox: document.querySelector(".question-box"),
      belowPanel: document.querySelector(".below-panel")
    };

    function parseCsv(text) {
      return text
        .split(/\r?\n/)
        .map(line => line.trim())
        .filter(Boolean)
        .map(line => line.split(";"))
        .filter(cols => cols.length >= 7 && /^\d+$/.test(cols[0]))
        .map(cols => ({
          id: cols[0].trim(),
          question: cols[1].trim(),
          answers: [cols[2].trim(), cols[3].trim(), cols[4].trim()],
          correctPosition: Number(cols[5].trim()),
          difficulty: clampDifficulty(Number(cols[6].trim()))
        }))
        .filter(q => q.question && q.answers.every(Boolean) && q.correctPosition >= 1 && q.correctPosition <= 3);
    }

    function clampDifficulty(value) {
      return Math.max(1, Math.min(3, value || 1));
    }

    function wait(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function showScreen(name) {
      Object.values(screens).forEach(screen => screen.classList.add("hidden"));
      screens[name].classList.remove("hidden");
    }

    function resetRun() {
      clearInterval(state.timerId);
      state.flowToken += 1;
      state.round = 1;
      state.totalScore = 0;
      state.timerValue = 0;
      state.currentQuestion = null;
      state.currentDifficulty = 1;
      state.currentVisibleAnswers = 0;
      state.selectedMultiplier = 3;
      state.correctStreak = 0;
      state.questionsPlayed = 0;
      state.correctAnswers = 0;
      state.usedIds = new Set();
      resetQuizUi();
    }

    function resetQuizUi() {
      clearInterval(state.timerId);
      clearGameOverMode();
      restoreBelowPanelStructure();
      els.uiTimerNum.textContent = "0";
      els.uiTimer.classList.remove("is-penalty");
      if (els.uiWert) { els.uiWert.textContent = "–"; }
      els.answers.innerHTML = "";
      els.nextAnswerWrap.className = "next-answer-wrap hidden";
      els.resultPoints.className = "result-points hidden";
      els.resultInfo.className = "small-info hidden";
      els.resultTotal.className = "result-points hidden";
      els.continueBtn.className = "continue-btn hidden";
      els.continueBtn.disabled = false;
      els.restartBtn.className = "continue-btn hidden";
      els.restartBtn.disabled = false;
      els.resultPoints.textContent = "";
      els.resultTotal.textContent = "";
      els.resultInfo.textContent = "";
      els.restartBtn.textContent = "Nochmal";
    }

    function updateTimerUrgency() {
      if (!els.uiTimer) return;
      els.uiTimer.classList.toggle("is-penalty", state.timerValue >= 11);
      // Live-update Wert during penalty phase
      if (state.currentVisibleAnswers > 0 && els.uiWert) {
        const base = getBasePoints();
        const penalty = Math.max(0, state.timerValue - 10);
        const current = Math.max(0, base - penalty);
        els.uiWert.textContent = `${current} Pkt`;
      }
    }

    function startTimer() {
      clearInterval(state.timerId);
      state.timerValue = 0;
      els.uiTimerNum.textContent = "0";
      els.uiTimer.classList.remove("is-penalty");
      updateTimerUrgency();
      state.timerId = setInterval(() => {
        state.timerValue += 1;
        els.uiTimerNum.textContent = String(state.timerValue);
        updateTimerUrgency();
      }, 1000);
    }

    function stopTimer() {
      clearInterval(state.timerId);
    }

    function getNextDifficulty() {
      if (state.correctStreak === 0) return 1;
      if (state.correctStreak === 1) return 2;
      if (state.correctStreak === 2) return 2;
      if (state.correctStreak === 3) return 3;
      return 1 + Math.floor(Math.random() * 3);
    }

    function pickQuestion() {
      if (!state.questions.length) return null;

      const targetDifficulty = getNextDifficulty();
      let available = state.questions.filter(
        q => q.difficulty === targetDifficulty && !state.usedIds.has(q.id)
      );

      if (!available.length) {
        available = state.questions.filter(q => q.difficulty === targetDifficulty);
      }

      if (!available.length) {
        available = state.questions.filter(q => !state.usedIds.has(q.id));
        if (!available.length) {
          state.usedIds.clear();
          available = [...state.questions];
        }
      }

      const picked = available[Math.floor(Math.random() * available.length)];
      state.usedIds.add(picked.id);
      return picked;
    }

    function createAnswerRow(index, text) {
      const button = document.createElement("button");
      button.className = "answer-row fade-in";
      button.type = "button";
      button.dataset.position = String(index + 1);

      const letter = document.createElement("div");
      letter.className = "letter";
      letter.textContent = LETTERS[index];

      const answerText = document.createElement("div");
      answerText.className = "answer-text";
      answerText.textContent = text;

      button.appendChild(letter);
      button.appendChild(answerText);
      button.addEventListener("click", () => chooseAnswer(index + 1));

      return button;
    }

    function renderVisibleAnswers(count) {
      els.answers.innerHTML = "";
      for (let i = 0; i < count; i += 1) {
        els.answers.appendChild(createAnswerRow(i, state.currentQuestion.answers[i]));
      }
    }

    function difficultyLabel(difficulty) {
      return DIFFICULTY_LABELS[difficulty] || "einfach";
    }

    async function loadRound() {
      resetQuizUi();
      const token = ++state.flowToken;
      const question = pickQuestion();

      if (!question) {
        alert("Keine Fragen verfügbar.");
        showScreen("welcome");
        return;
      }

      state.currentQuestion = question;
      state.currentDifficulty = question.difficulty;
      state.currentVisibleAnswers = 0;
      state.selectedMultiplier = 3;

      els.uiUsername.textContent = state.username;
      if (els.uiAvatar) els.uiAvatar.textContent = (state.username[0] || "?").toUpperCase();

      const levelLabels = { 1: "Leicht", 2: "Mittel", 3: "Schwer" };
      const lvl = question.difficulty;
      els.uiRoundDifficulty.querySelector(".label-frage").textContent = String(state.round);
      els.uiRoundDifficulty.querySelector(".label-level").textContent = levelLabels[lvl] || "Leicht";
      els.uiRoundDifficulty.className = `tb-chips level-${lvl}`;

      els.uiScore.textContent = `${state.totalScore} Punkte`;
      els.questionText.textContent = question.question;
      els.questionText.classList.remove("fade-in");
      void els.questionText.offsetWidth;
      els.questionText.classList.add("fade-in");

      showScreen("quiz");

      await wait(1000);
      if (token !== state.flowToken) return;

      state.currentVisibleAnswers = 1;
      renderVisibleAnswers(1);
      startTimer();
      updateNextAnswerButton();

      // Show Wert once first answer option is visible
      if (els.uiWert) {
        els.uiWert.textContent = `${getBasePoints()} Pkt`;
      }
    }

    function updateNextAnswerButton() {
      const showButton = state.currentVisibleAnswers < 3;
      els.nextAnswerWrap.classList.toggle("hidden", !showButton);
    }

    function revealNextAnswer() {
      if (!state.currentQuestion) return;
      if (state.currentVisibleAnswers >= 3) return;

      state.currentVisibleAnswers += 1;
      state.selectedMultiplier = Math.max(1, 4 - state.currentVisibleAnswers);
      renderVisibleAnswers(state.currentVisibleAnswers);
      updateNextAnswerButton();

      // Update Wert to reflect new multiplier
      if (els.uiWert) {
        const base = getBasePoints();
        const penalty = Math.max(0, state.timerValue - 10);
        els.uiWert.textContent = `${Math.max(0, base - penalty)} Pkt`;
      }
    }

    function getBasePoints() {
      return state.currentDifficulty * 10 * state.selectedMultiplier;
    }

    function chooseAnswer(position) {
      if (!state.currentQuestion) return;

      stopTimer();
      els.nextAnswerWrap.classList.add("hidden");
      lockAllAnswers();

      // Show clicked state immediately
      const clickedRow = [...els.answers.children].find(btn => Number(btn.dataset.position) === position);
      if (clickedRow) clickedRow.classList.add("clicked-state");

      // Wait 1 second before revealing result
      window.setTimeout(() => {
        if (clickedRow) clickedRow.classList.remove("clicked-state");
        const isCorrect = position === state.currentQuestion.correctPosition;
        if (isCorrect) {
          handleCorrect();
        } else {
          handleWrong(position);
        }
      }, 1000);
    }

    function lockAllAnswers() {
      [...els.answers.children].forEach(btn => {
        btn.classList.add("locked");
        btn.disabled = true;
      });
    }

    function showContinueDisabledThenEnable(showTotalLater) {
      els.continueBtn.classList.remove("hidden");
      els.continueBtn.classList.add("is-disabled");
      els.continueBtn.disabled = true;
      els.continueBtn.classList.add("fade-in");

      window.setTimeout(() => {
        if (showTotalLater) {
          els.resultTotal.classList.remove("hidden");
          els.resultTotal.classList.add("fade-in");
        }
        els.continueBtn.disabled = false;
        els.continueBtn.classList.remove("is-disabled");
      }, 2000);
    }

    function clearGameOverMode() {
      els.goCard.classList.add("hidden");
      els.questionBox.classList.remove("hidden");
      els.answers.classList.remove("hidden");
      els.belowPanel.classList.remove("hidden");
    }

    // ── Edit Mode ─────────────────────────────────────────────────────────

    const editState = { questions: [], currentIndex: 0 };

    function editGetBadIds() {
      try { return new Set(JSON.parse(localStorage.getItem("editBadIds") || "[]")); }
      catch { return new Set(); }
    }
    function editGetPool() {
      try { return JSON.parse(localStorage.getItem("editPool") || "[]"); }
      catch { return []; }
    }
    function editSaveBadIds(idSet) {
      localStorage.setItem("editBadIds", JSON.stringify([...idSet]));
    }
    function editSavePool(pool) {
      localStorage.setItem("editPool", JSON.stringify(pool));
    }

    function editUpdateBadCount() {
      els.editBadCount.textContent = String(editGetBadIds().size);
    }

    async function showEditMode() {
      const username = els.usernameInput.value.trim();
      const ort = els.ortInput.value.trim();
      if (!username || !ort) { els.usernameInput.focus(); return; }

      showScreen("edit");
      editState.currentIndex = 0;
      editState.questions = [];
      els.editOkBtn.disabled = true;
      els.editBadBtn.disabled = true;
      els.editBackBtn.disabled = true;
      els.editStatus.textContent = "Alle Fragen werden geladen…";
      els.editStatus.classList.remove("hidden");
      editUpdateBadCount();

      const badIds = editGetBadIds();
      let loaded = [];
      try {
        const res = await fetch(API_URL + "?all=1");
        const data = await res.json();
        if (data && data.length) loaded = data;
      } catch (e) {
        loaded = parseCsv(DEMO_CSV);
      }

      editState.questions = loaded.filter(q => !badIds.has(q.id));
      editState.currentIndex = 0;
      els.editStatus.classList.add("hidden");
      editShowQuestion();
    }

    function editShowQuestion() {
      const total = editState.questions.length;
      editUpdateBadCount();

      if (total === 0) {
        els.editQuestionText.textContent = "Keine Fragen mehr im Pool.";
        els.editAnswers.innerHTML = "";
        els.editStatus.textContent = "Alle Fragen bewertet.";
        els.editStatus.classList.remove("hidden");
        els.editOkBtn.disabled = true;
        els.editBadBtn.disabled = true;
        els.editBackBtn.disabled = true;
        return;
      }

      const q = editState.questions[editState.currentIndex];
      els.editIdx.textContent = String(editState.currentIndex + 1);
      els.editTotal.textContent = String(total);
      els.editQuestionText.textContent = q.question;

      const labels = ["A", "B", "C"];
      els.editAnswers.innerHTML = "";
      q.answers.forEach((ans, i) => {
        const div = document.createElement("div");
        const correct = (i + 1) === q.correctPosition;
        div.className = "edit-answer" + (correct ? " is-correct" : "");
        div.innerHTML = `<span class="ea-label">${labels[i]}</span><span>${ans}</span>`;
        els.editAnswers.appendChild(div);
      });

      els.editOkBtn.disabled = false;
      els.editBadBtn.disabled = false;
      els.editBackBtn.disabled = editState.currentIndex === 0;
      els.editStatus.classList.add("hidden");
    }

    function editNext() {
      editState.currentIndex += 1;
      if (editState.currentIndex >= editState.questions.length) {
        editState.currentIndex = editState.questions.length;
      }
      editShowQuestion();
    }

    function editPrev() {
      if (editState.currentIndex > 0) {
        editState.currentIndex -= 1;
        editShowQuestion();
      }
    }

    function editMarkOk() { editNext(); }

    function editMarkBad() {
      const q = editState.questions[editState.currentIndex];

      const pool = editGetPool();
      if (!pool.find(p => p.id === q.id)) { pool.push(q); editSavePool(pool); }

      const badIds = editGetBadIds();
      badIds.add(q.id);
      editSaveBadIds(badIds);

      editState.questions.splice(editState.currentIndex, 1);
      if (editState.currentIndex >= editState.questions.length) {
        editState.currentIndex = Math.max(0, editState.questions.length - 1);
      }
      editShowQuestion();
    }

    // ── /Edit Mode ────────────────────────────────────────────────────────

    function renderGameOverSummary() {
      // Hide question area, show card
      els.questionBox.classList.add("hidden");
      els.answers.classList.add("hidden");
      els.belowPanel.classList.add("hidden");

      els.goPlayerName.textContent = state.username || "–";
      els.goQuestionsPlayed.textContent = `${state.questionsPlayed} Frage${state.questionsPlayed !== 1 ? "n" : ""} gespielt`;
      els.goScore.textContent = String(state.totalScore);
      els.goQuestions.textContent = String(state.questionsPlayed);
      els.goCorrect.textContent = String(state.correctAnswers);

      els.goCard.classList.remove("hidden");
      els.goCard.classList.add("fade-in");
    }

    function restoreBelowPanelStructure() {
      const panel = document.querySelector(".below-panel");
      panel.innerHTML = "";
      panel.appendChild(els.nextAnswerWrap);
      panel.appendChild(els.resultPoints);
      panel.appendChild(els.resultTotal);
      panel.appendChild(els.resultInfo);
      panel.appendChild(els.continueBtn);
      panel.appendChild(els.restartBtn);
    }

    function handleWrong(position) {
      const row = [...els.answers.children].find(btn => Number(btn.dataset.position) === position);
      if (row) row.classList.add("wrong-state");

      // After 1 second: show correct answer in green, then game over
      window.setTimeout(() => {
        // Find and highlight the correct answer among visible buttons
        const correctPos = state.currentQuestion.correctPosition;
        const correctRow = [...els.answers.children].find(btn => Number(btn.dataset.position) === correctPos);
        if (correctRow) {
          correctRow.classList.add("correct-state");
        } else {
          // Correct answer not visible – append it
          const correctText = state.currentQuestion.answers[correctPos - 1];
          const newRow = createAnswerRow(correctPos - 1, correctText);
          newRow.disabled = true;
          newRow.classList.add("locked", "correct-state");
          newRow.dataset.position = String(correctPos);
          els.answers.appendChild(newRow);
        }

        // Trigger game over after a short pause to let user see the correct answer
        window.setTimeout(() => {
          stopTimer();
          state.questionsPlayed += 1;

          window.setTimeout(() => {
            renderGameOverSummary();
            if (typeof window.saveScore === "function") {
              window.saveScore(state.username, state.totalScore, state.plz, state.ort, state.land);
            }
            els.goRestartBtn.disabled = true;
            window.setTimeout(() => {
              els.goRestartBtn.disabled = false;
            }, 1200);
          }, 250);
        }, 1200);
      }, 1000);
    }

    function handleCorrect() {
      const basePoints = getBasePoints();
      const penaltyPoints = Math.max(0, state.timerValue - 10);
      const finalPoints = basePoints - penaltyPoints;

      if (finalPoints < 0) {
        handleWrong(0);
        return;
      }

      state.totalScore += finalPoints;
      state.correctStreak += 1;
      state.questionsPlayed += 1;
      state.correctAnswers += 1;

      // Update score display in header
      if (els.uiScore) els.uiScore.textContent = `${state.totalScore} Punkte`;

      const correctText = state.currentQuestion.answers[state.currentQuestion.correctPosition - 1];

      els.answers.innerHTML = "";
      const correctRow = createAnswerRow(0, correctText);
      correctRow.disabled = true;
      correctRow.classList.add("locked", "correct-state");
      correctRow.dataset.position = "1";
      els.answers.appendChild(correctRow);

      els.resultPoints.textContent = `${finalPoints} Punkte`;
      els.resultPoints.classList.remove("hidden");
      els.resultPoints.classList.add("fade-in");

      const showTotalLater = state.round >= 2;
      if (showTotalLater) {
        els.resultTotal.textContent = `${state.totalScore} Punkte Punkte`;
        els.resultTotal.classList.add("hidden");
      } else {
        els.resultTotal.textContent = "";
        els.resultTotal.classList.add("hidden");
      }

      if (penaltyPoints > 0) {
        els.resultInfo.textContent = `Basis ${basePoints} – ${penaltyPoints} Punkte Zeitabzug`;
        els.resultInfo.classList.remove("hidden");
        els.resultInfo.classList.add("fade-in");
      } else {
        els.resultInfo.textContent = "";
        els.resultInfo.classList.add("hidden");
      }

      showContinueDisabledThenEnable(showTotalLater);
    }

    function nextRound() {
      state.round += 1;
      loadRound();
    }

    async function startGame() {
      const rawName = els.usernameInput.value.trim();
      if (!rawName) {
        alert("Bitte gib zuerst einen Namen ein.");
        els.usernameInput.focus();
        return;
      }

      const rawOrt = els.ortInput.value.trim();

      if (!rawOrt) {
        alert("Bitte gib deinen Ort ein.");
        els.ortInput.focus();
        return;
      }

      state.username = rawName.slice(0, 12);
      state.ort = rawOrt.slice(0, 40);

      // Sicherstellen dass Fragen geladen sind
      if (!state.questions.length) {
        els.startBtn.disabled = true;
        els.loadingHint.classList.remove("hidden");
        try {
          const res = await fetch(`${API_URL}?count=50`);
          if (res.ok) {
            const data = await res.json();
            if (data && data.length) state.questions = data;
          }
        } catch (e) { /* ignored */ }
        if (!state.questions.length) {
          state.questions = parseCsv(DEMO_CSV);
        }
        els.loadingHint.classList.add("hidden");
        els.startBtn.disabled = false;
      }

      resetRun();
      loadRound();
    }

    const API_URL = "https://trivia-quiz-api.marcus-gisa1.workers.dev";

    async function loadQuestionsFromAPI() {
      try {
        const res = await fetch(`${API_URL}?count=50`);
        if (!res.ok) return;
        const data = await res.json();
        if (data && data.length) {
          const badIds = editGetBadIds();
          state.questions = badIds.size > 0 ? data.filter(q => !badIds.has(q.id)) : data;
        }
      } catch (e) { /* silent fallback — startGame handles missing questions */ }
    }

    async function showHighscores() {
      showScreen("highscore");
      els.highscoreList.innerHTML = '<p class="hs-loading">Wird geladen…</p>';
      const scores = typeof window.loadHighscores === "function"
        ? await window.loadHighscores()
        : [];
      if (!scores.length) {
        els.highscoreList.innerHTML = '<p class="hs-loading">Noch keine Einträge.</p>';
        return;
      }
      const table = document.createElement("table");
      table.className = "hs-table";
      table.innerHTML = `<thead><tr>
        <th class="hs-rank">#</th>
        <th>Name</th>
        <th>Ort</th>
        <th class="hs-score">Score</th>
      </tr></thead>`;
      const tbody = document.createElement("tbody");
      scores.forEach((s, i) => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td class="hs-rank">${i + 1}</td>
          <td>${s.username || "–"}</td>
          <td>${[s.ort, s.land].filter(Boolean).join(", ") || "–"}</td>
          <td class="hs-score">${s.score}</td>`;
        tbody.appendChild(tr);
      });
      table.appendChild(tbody);
      els.highscoreList.innerHTML = "";
      els.highscoreList.appendChild(table);
    }

    if (els.startBtn) els.startBtn.addEventListener("click", startGame);
    if (els.usernameInput) els.usernameInput.addEventListener("keydown", event => {
      if (event.key === "Enter") startGame();
    });

    if (els.highscoreBtn) els.highscoreBtn.addEventListener("click", showHighscores);
    if (els.backBtn) els.backBtn.addEventListener("click", () => showScreen("welcome"));

    els.nextAnswerBtn.addEventListener("click", revealNextAnswer);
    els.continueBtn.addEventListener("click", nextRound);
    els.restartBtn.addEventListener("click", () => {
      resetRun();
      loadRound();
    });
    els.goRestartBtn.addEventListener("click", () => {
      resetRun();
      loadRound();
    });
    els.goHsBtn.addEventListener("click", () => showHighscores());

    els.editOkBtn.addEventListener("click", editMarkOk);
    els.editBadBtn.addEventListener("click", editMarkBad);
    els.editBackBtn.addEventListener("click", editPrev);
    els.editExitBtn.addEventListener("click", () => showScreen("welcome"));

    document.getElementById("quiz-title-q").addEventListener("click", showEditMode);

    loadQuestionsFromAPI();
  </script>
</body>
</html>
